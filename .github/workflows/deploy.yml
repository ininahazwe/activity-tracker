name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/dxtrmfwa/repositories/activity-tracker
            git pull origin main

            # Backend
            cd server
            npm ci
            npm run build
            pm2 restart tracker-api

            # Frontend
            cd ../client
            npm ci
            npm run build
            cp -r dist/. /home/dxtrmfwa/public_html/tracker.mfwa.org/